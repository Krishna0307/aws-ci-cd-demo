name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: YOUR_EC2_PUBLIC_IP
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/html
            sudo git pull
            sudo systemctl restart httpd
